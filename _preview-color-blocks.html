<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview — 菜品 Mesh Gradient 色塊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="demos/demos.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 56px 24px 96px; background: #f9f9f7; font-family: "Geist", sans-serif; }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; color: #18181b; margin: 0 0 4px; }
    p.note { font-size: 13px; color: #71717a; margin: 0 0 20px; line-height: 1.6; }
    .switcher { display: flex; gap: 8px; margin-bottom: 40px; }
    .switcher button {
      font-family: "Geist", sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 9px 18px; border-radius: 100px;
      border: 1px solid #e4e4e1; background: #fff; color: #52525b; cursor: pointer;
    }
    .switcher button.on { background: #18181b; border-color: #18181b; color: #fff; }

    /* ==============================================================
       菜品圖:soft abstract mesh gradient — 淡黃 / 淺橘 / 黃橙 / 淺藍 / 淡綠
       多層 radial 疊出有機形狀,大範圍羽化 = 模糊夢幻;
       慢速漂移 = fluid / liquid 流動感
       ============================================================== */
    .tdv-img {
      background-size: 165% 165% !important;
      animation: dish-mesh-drift 12s ease-in-out infinite alternate;
    }
    /* 亮彩發光版:高飽和 × 高明度(high-key)— 奶油黃、天空青、湖水綠、薄荷 */
    .tdv-grid .tdv-card:nth-child(6n+1) .tdv-img { background:
      radial-gradient(85% 80% at 30% 65%, #f7d94e 0%, rgba(247, 217, 78, 0.55) 45%, transparent 78%),
      radial-gradient(60% 55% at 85% 20%, #ffe98a 0%, transparent 65%), #8ce1f0; }
    .tdv-grid .tdv-card:nth-child(6n+2) .tdv-img { background:
      radial-gradient(70% 65% at 42% 45%, #a8f5cf 0%, rgba(139, 240, 196, 0.5) 48%, transparent 76%),
      radial-gradient(55% 50% at 15% 85%, #8bf0c4 0%, transparent 62%), #35c9c4; }
    .tdv-grid .tdv-card:nth-child(6n+3) .tdv-img { background:
      radial-gradient(80% 75% at 70% 30%, #7eddf2 0%, rgba(126, 221, 242, 0.5) 46%, transparent 76%),
      radial-gradient(60% 55% at 20% 90%, #b3ecf7 0%, transparent 64%), #ffe374; }
    .tdv-grid .tdv-card:nth-child(6n+4) .tdv-img { background:
      radial-gradient(80% 75% at 30% 30%, #d4f26e 0%, rgba(196, 240, 110, 0.5) 46%, transparent 76%),
      radial-gradient(60% 55% at 85% 80%, #f2faa0 0%, transparent 64%), #4fd4cc; }
    .tdv-grid .tdv-card:nth-child(6n+5) .tdv-img { background:
      radial-gradient(75% 70% at 65% 70%, #ffcf6e 0%, rgba(255, 207, 110, 0.5) 46%, transparent 75%),
      radial-gradient(60% 55% at 20% 20%, #ffe285 0%, transparent 62%), #a5e8dd; }
    .tdv-grid .tdv-card:nth-child(6n+6) .tdv-img { background:
      radial-gradient(70% 65% at 25% 35%, #5fd8cf 0%, rgba(95, 216, 207, 0.5) 48%, transparent 74%),
      radial-gradient(65% 60% at 80% 85%, #8bf0c4 0%, transparent 64%), #ffe98a; }
    /* 購物車縮圖呼應 */
    .tdv-item:nth-child(1) .tdv-thumb { background:
      radial-gradient(90% 85% at 35% 70%, #f7d94e 0%, transparent 75%), #8ce1f0; }
    .tdv-item:nth-child(2) .tdv-thumb { background:
      radial-gradient(80% 75% at 45% 45%, #a8f5cf 0%, transparent 72%), #35c9c4; }
    @keyframes dish-mesh-drift {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .tdv-img { animation: none; }
    }

    /* 三段強度:同一組 mesh,調整飽和與明度 */
    .tone-dreamy .tdv-img { filter: saturate(0.72) brightness(1.04); }
    .tone-vivid .tdv-img { filter: saturate(1.4); }
    .tdv-tier.tdv-locked .tdv-card .tdv-img { filter: none; } /* 置灰時交還給卡片的 grayscale */

    /* ---- 舞台背景變體(亮彩 high-key 同色系) ---- */
    .stage-lum-linear .fig-demo {
      --fig-pastel: linear-gradient(100deg, #f7d94e, #8ce1f0 28%, #35c9c4 52%, #8bf0c4 74%, #ffe374 100%);
      --fig-fade: var(--fig-fade-tall);
    }
    .stage-lum-mesh .fig-demo {
      --fig-pastel:
        radial-gradient(55% 120% at 12% 100%, #f7d94e 0%, transparent 65%),
        radial-gradient(45% 110% at 40% 100%, #8ce1f0 0%, transparent 62%),
        radial-gradient(50% 120% at 68% 100%, #35c9c4 0%, transparent 62%),
        radial-gradient(55% 110% at 95% 100%, #8bf0c4 0%, transparent 65%);
      --fig-fade: var(--fig-fade-tall);
    }
  </style>
  <script src="analytics.js?v=20260714c"></script>
</head>
<body class="case-tablet">
  <div class="wrap">
    <h1>菜品 Mesh Gradient 色塊 — 預覽</h1>
    <p class="note">Luminous mesh gradient(high-key):奶油黃、天空青、湖水綠、薄荷 &mdash; 高飽和 × 高明度,輕來自「發光」而不是洗白;有機光暈 + 大範圍羽化 + 12 秒慢速漂移。三顆按鈕切換強度。只是提案預覽,正式站仍是灰色佔位。</p>
    <div class="switcher" id="tone-row">
      <button data-tone="tone-dreamy">菜品:更霧・更夢幻</button>
      <button data-tone="" class="on">菜品:標準</button>
      <button data-tone="tone-vivid">菜品:稍微鮮明</button>
    </div>
    <div class="switcher" id="stage-row">
      <button data-stage="" class="on">背景:現行・日落</button>
      <button data-stage="stage-lum-linear">背景:亮彩・線性</button>
      <button data-stage="stage-lum-mesh">背景:亮彩・Mesh</button>
    </div>
    <div class="fig-demo" id="demo-tablet-05-tier-unlock"></div>
  </div>
  <script src="demos/tablet-05-tier-unlock.js" defer></script>
  <script src="demos/fig-hover.js" defer></script>
  <script>
    let tone = "", stage = "";
    const applyClasses = () => {
      document.body.className = ("case-tablet " + tone + " " + stage).trim();
    };
    document.querySelectorAll("#tone-row button").forEach((b) => {
      b.addEventListener("click", () => {
        tone = b.dataset.tone;
        applyClasses();
        document.querySelectorAll("#tone-row button").forEach((x) => x.classList.toggle("on", x === b));
      });
    });
    document.querySelectorAll("#stage-row button").forEach((b) => {
      b.addEventListener("click", () => {
        stage = b.dataset.stage;
        applyClasses();
        document.querySelectorAll("#stage-row button").forEach((x) => x.classList.toggle("on", x === b));
      });
    });
  </script>
</body>
</html>
